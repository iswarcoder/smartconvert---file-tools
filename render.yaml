services:
  - type: web
    name: smartconvert-file-tools
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ILOVEPDF_PUBLIC_KEY
        sync: false
      - key: ILOVEPDF_SECRET_KEY
        sync: false
