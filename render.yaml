services:
  - type: web
    name: smartconvert-file-tools
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 180
    envVars:
      - key: FLASK_ENV
        value: production
